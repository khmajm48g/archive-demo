<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منظومة الاستدلال السريع</title>

<style>

body{
    font-family: Tahoma, Arial;
    background:#f4f7fc;
    margin:0;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    color:#1e3a8a;
}

.search-box{
    text-align:center;
    margin:30px 0;
}

input{
    width:90%;
    max-width:700px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
}

.result{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.list-link{
    color:#2563eb;
    font-weight:bold;
    text-decoration:none;
}

.list-link:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h1>
🏛️ منظومة الاستدلال السريع على القوائم والمعاملات المؤرشفة
</h1>

<div class="search-box">
<input
type="text"
id="search"
placeholder="ابحث بالاسم أو الرقم الوظيفي">
</div>

<div id="results"></div>

</div>

<script>

let employees = [];

fetch('employees.json')
.then(response => response.json())
.then(data => {
    employees = data;
});

const searchInput = document.getElementById('search');
const resultsDiv = document.getElementById('results');

searchInput.addEventListener('input', function() {

    const keyword = this.value.trim();

    resultsDiv.innerHTML = '';

    if(keyword === '') return;

    const results = employees.filter(emp =>
      emp.name.includes(keyword) ||
emp.employee_id.includes(keyword) ||
emp.list_no.includes(keyword)
    );

    results.forEach(emp => {

        resultsDiv.innerHTML += `
        <div class="result">

            <p><strong>الرقم الوظيفي:</strong> ${emp.employee_id}</p>

            <p><strong>الاسم:</strong> ${emp.name}</p>

            <p><strong>القيمة:</strong> ${emp.value} د.ل</p>

            <p>
            <strong>رقم القائمة:</strong>

            <a class="list-link"
               href="list.html?id=${emp.list_no}">
               ${emp.list_no}
            </a>

            </p>

        </div>
        `;
    });

});

</script>

</body>
</html>
