<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بيانات القائمة</title>

<style>

body{
    font-family:Tahoma,Arial;
    background:#f4f7fc;
    padding:30px;
}

.card{
    max-width:800px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    color:#1e3a8a;
    text-align:center;
}

.item{
    margin:15px 0;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 20px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.btn:hover{
    background:#1d4ed8;
}

.error{
    color:red;
    text-align:center;
    font-size:20px;
}

</style>

</head>

<body>

<div class="card">

<h1>📋 بيانات القائمة</h1>

<div id="content">
جاري تحميل البيانات...
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const branch = params.get("branch");
const listNo = params.get("list");

const content = document.getElementById("content");

fetch("lists.json")
.then(response => response.json())
.then(lists => {

const list = lists.find(item =>
item.branch === branch &&
item.list_no === listNo
);

if(!list){

content.innerHTML =
'<div class="error">القائمة غير موجودة</div>';

return;

}

const pdfPath =
`pdf/${list.branch}/${list.list_no}.pdf`;

content.innerHTML = `

<div class="item">
<b>🆔 رقم القائمة:</b>
${list.list_no}
</div>

<div class="item">
<b>🏢 الفرع:</b>
${list.branch}
</div>

<div class="item">
<b>📦 عدد المعاملات:</b>
${list.count}
</div>

<div class="item">
<b>💰 إجمالي القيمة:</b>
${list.total} د.ل
</div>

<div class="item">
<b>📅 تاريخ الصرف:</b>
${list.date}
</div>

<div class="item">
<b>📝 الرقم الإشاري:</b>
${list.reference}
</div>

<a
class="btn"
href="${pdfPath}"
target="_blank">

📄 فتح القائمة PDF

</a>

`;

})
.catch(error=>{

console.error(error);

content.innerHTML =
'<div class="error">تعذر تحميل بيانات القائمة</div>';

});

</script>

</body>
</html>
